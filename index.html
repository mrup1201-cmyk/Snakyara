
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Ultra Fixed</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle,#0f172a,#020617);
    font-family:Arial;
}

canvas{
    display:block;
}

#menu{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.6);
    color:white;
}

button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    margin-top:10px;
}

#hud{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div id="hud">
Score: <span id="score">0</span> |
Best: <span id="best">0</span>
</div>

<div id="menu">
    <h1>🐍 Snake Ultra Fixed</h1>
    <button onclick="startGame()">PLAY</button>
</div>

<canvas id="c"></canvas>

<script>
/* ===== TELEGRAM ===== */
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

/* ===== CANVAS ===== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ===== GAME STATE ===== */
const grid = 20;
let snake, dir, food, bonus;
let score = 0;
let best = localStorage.getItem("best") || 0;
document.getElementById("best").innerText = best;

let speed = 8;
let acc = 0;
let lastTime = 0;
let running = false;

/* ===== INIT ===== */
function reset(){
    snake = [{x:10,y:10}];
    dir = {x:1,y:0};
    score = 0;
    speed = 8;
    bonus = null;
    spawnFood();
}

/* ===== SPAWN ===== */
function spawnFood(){
    food = {
        x: Math.floor(Math.random()*20),
        y: Math.floor(Math.random()*20)
    };
}

/* ===== BONUS ===== */
function spawnBonus(){
    if (Math.random() > 0.92){
        bonus = {
            x: Math.floor(Math.random()*20),
            y: Math.floor(Math.random()*20)
        };
    }
}

/* ===== GAME LOOP (FIXED 60 FPS CONTROL) ===== */
function loop(t){

    if (!running) return;
    requestAnimationFrame(loop);

    if (!lastTime) lastTime = t;
    const delta = t - lastTime;

    if (delta < 1000 / speed) return;

    lastTime = t;

    update();
    draw();
}

/* ===== UPDATE ===== */
function update(){

    const head = {
        x: snake[0].x + dir.x,
        y: snake[0].y + dir.y
    };

    /* walls */
    if (head.x < 0 || head.y < 0 ||
        head.x >= 20 || head.y >= 20){
        gameOver();
        return;
    }

    /* self collision */
    for (let s of snake){
        if (s.x === head.x && s.y === head.y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    /* food */
    if (head.x === food.x && head.y === food.y){
        score++;
        spawnFood();
        spawnBonus();
        speed += 0.15;
    } else {
        snake.pop();
    }

    /* bonus */
    if (bonus && head.x === bonus.x && head.y === bonus.y){
        score += 5;
        bonus = null;

        tg?.HapticFeedback?.notificationOccurred("success");
    }

    document.getElementById("score").innerText = score;

    if (score > best){
        best = score;
        localStorage.setItem("best", best);
        document.getElementById("best").innerText = best;
    }
}

/* ===== DRAW (CLEAN + GLOW) ===== */
function draw(){

    ctx.fillStyle = "#0b1220";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* food */
    ctx.shadowBlur = 20;
    ctx.shadowColor = "red";
    ctx.fillStyle = "red";
    ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

    /* bonus */
    if (bonus){
        ctx.shadowColor = "gold";
        ctx.fillStyle = "gold";
        ctx.fillRect(bonus.x*grid, bonus.y*grid, grid-2, grid-2);
    }

    /* snake */
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ff88";

    snake.forEach((s,i)=>{
        ctx.fillStyle = i===0 ? "#00ff88" : "#00aa55";
        ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2);
    });
}

/* ===== CONTROLS (ULTRA FIXED SWIPE) ===== */
let sx, sy;

document.addEventListener("touchstart", e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
},{passive:true});

document.addEventListener("touchend", e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;

    if (Math.abs(dx) > Math.abs(dy)){
        if (dx > 0 && dir.x === 0) dir = {x:1,y:0};
        else if (dx < 0 && dir.x === 0) dir = {x:-1,y:0};
    } else {
        if (dy > 0 && dir.y === 0) dir = {x:0,y:1};
        else if (dy < 0 && dir.y === 0) dir = {x:0,y:-1};
    }
},{passive:true});

/* keyboard */
document.addEventListener("keydown", e=>{
    if (e.key === "ArrowUp" && dir.y===0) dir={x:0,y:-1};
    if (e.key === "ArrowDown" && dir.y===0) dir={x:0,y:1};
    if (e.key === "ArrowLeft" && dir.x===0) dir={x:-1,y:0};
    if (e.key === "ArrowRight" && dir.x===0) dir={x:1,y:0};
});

/* ===== GAME CONTROL ===== */
function startGame(){
    document.getElementById("menu").style.display = "none";
    reset();
    running = true;
    requestAnimationFrame(loop);
}

function gameOver(){
    running = false;
    document.getElementById("menu").style.display = "flex";

    if (tg?.HapticFeedback){
        tg.HapticFeedback.notificationOccurred("error");
    }
}
</script>

</body>
</html>
